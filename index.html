<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>j4on ai | Gemini</title>

<style>
:root {
  --bg: #1f1f1f;
  --panel: #2a2a2a;
  --text: #ffffff;
  --accent: #00bfff;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
#sidebar {
  position: fixed;
  left: -260px;
  width: 260px;
  height: 100%;
  background: var(--panel);
  padding: 15px;
  box-sizing: border-box;
  transition: 0.3s;
  z-index: 10;
  border-right: 2px solid var(--accent);
}

#sidebar.active { left: 0; }

#chatList { margin-top: 15px; }

.chatItem {
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
  background: rgba(0,0,0,0.2);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

.chatItem.active { border-left: 4px solid var(--accent); background: rgba(0, 191, 255, 0.1); }

/* Buttons */
button {
  padding: 10px 16px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(135deg, #00bfff, #007bff);
  color: white;
  box-shadow: 0 4px 12px rgba(0, 191, 255, 0.3);
  transition: 0.2s;
}

button:hover { transform: translateY(-1px); opacity: 0.9; }

.smallBtn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 16px;
  cursor: pointer;
  box-shadow: none;
  padding: 2px 5px;
}

/* Main */
#main { flex: 1; display: flex; flex-direction: column; width: 100%; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  font-size: 18px;
  font-weight: bold;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.message {
  margin: 8px 0;
  padding: 12px;
  border-radius: 15px;
  max-width: 85%;
  line-height: 1.5;
  word-wrap: break-word;
  animation: fade 0.2s ease-in;
}

.user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
.bot { background: var(--panel); align-self: flex-start; color: var(--text); border: 1px solid rgba(255,255,255,0.05); border-bottom-left-radius: 2px; }

@keyframes fade { from {opacity:0; transform:translateY(5px);} to {opacity:1;} }

#inputArea { display: flex; padding: 15px; background: var(--panel); gap: 10px; }
input[type="text"], input[type="password"] {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(0,0,0,0.3);
  color: var(--text);
  outline: none;
}

#tokenCounter { font-size: 11px; color: var(--accent); margin: 5px 15px; opacity: 0.8; }

/* Modals */
#keyModal, #helpModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); display: flex; justify-content: center;
    align-items: center; z-index: 100;
}
.modal-content { 
    background: var(--panel); padding: 30px; border-radius: 20px; 
    text-align: center; border: 1px solid var(--accent); width: 90%; max-width: 400px;
}
.hidden { display: none !important; }
</style>
</head>

<body>

<div id="keyModal">
    <div class="modal-content">
        <h3 style="margin-top:0; color: var(--accent);">j4on ai</h3>
        <p style="font-size: 13px; opacity: 0.8;">Для работы нужен API Ключ Gemini</p>
        <input type="password" id="apiKeyInput" placeholder="Вставьте ваш AIzaSy..." style="width: 100%; margin-bottom: 15px;">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="saveApiKey()">Начать</button>
            <button onclick="showHelp()" style="background: #444; box-shadow: none;">Как получить?</button>
        </div>
    </div>
</div>

<div id="helpModal" class="hidden">
    <div class="modal-content" style="text-align: left;">
        <h4 style="color: var(--accent); margin-top:0;">Как получить ключ:</h4>
        <ol style="font-size: 14px; line-height: 1.6; padding-left: 20px;">
            <li>Зайдите в <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: var(--accent);">Google AI Studio</a>.</li>
            <li>Нажмите <b>"Create API key"</b>.</li>
            <li>Скопируйте ключ (начинается на AIza...).</li>
        </ol>
        <button onclick="closeHelp()" style="width:100%;">Понятно</button>
    </div>
</div>

<div id="sidebar">
  <button onclick="createChat()" style="width: 100%;">➕ Новый чат</button>
  <div id="chatList"></div>
  <hr style="opacity: 0.1; margin: 20px 0;">
  <button class="smallBtn" onclick="resetKey()" style="font-size: 11px; color: #ff5555;">⚙️ Сбросить ключ</button>
</div>

<div id="main">
  <header>
    <span id="chatTitle">j4on ai</span>
    <span id="menuBtn" onclick="toggleMenu()">☰</span>
  </header>

  <div id="chat"></div>

  <div id="tokenCounter">Слов отправлено: 0 / 20000</div>

  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Спроси о чем-нибудь..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("gemini_api_key") || "";
let chats = JSON.parse(localStorage.getItem("j4on_chats") || "[]");
let currentChat = null;
let wordsUsed = parseInt(localStorage.getItem("wordsUsed") || "0");
const WORD_LIMIT = 20000;

// Инициализация при входе
if(API_KEY) document.getElementById("keyModal").classList.add("hidden");

function saveApiKey() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if(key.startsWith("AIza")) {
        localStorage.setItem("gemini_api_key", key);
        API_KEY = key;
        document.getElementById("keyModal").classList.add("hidden");
    } else {
        alert("Неверный формат ключа! Он должен начинаться с AIza.");
    }
}

function showHelp() { document.getElementById("helpModal").classList.remove("hidden"); }
function closeHelp() { document.getElementById("helpModal").classList.add("hidden"); }
function resetKey() { if(confirm("Сбросить ключ?")) { localStorage.removeItem("gemini_api_key"); location.reload(); } }
function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }

function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";
  chats.forEach((chat, i) => {
    const div = document.createElement("div");
    div.className = "chatItem" + (i === currentChat ? " active" : "");
    div.innerHTML = `
      <div style="flex:1; overflow:hidden; white-space:nowrap;" onclick="openChat(${i}); toggleMenu()">${chat.name}</div>
      <button class="smallBtn" onclick="deleteChat(${i})">🗑</button>
    `;
    list.appendChild(div);
  });
}

function createChat() {
  chats.unshift({ name: "Новый чат", history: [] });
  currentChat = 0;
  save();
  renderChats();
  openChat(0);
}

function openChat(i) {
  currentChat = i;
  document.getElementById("chat").innerHTML = "";
  document.getElementById("chatTitle").innerText = chats[i].name;
  chats[i].history.forEach(msg => {
    addMessage(msg.parts[0].text, msg.role === "user" ? "user" : "bot");
  });
  renderChats();
}

function deleteChat(i) {
  event.stopPropagation();
  if(!confirm("Удалить чат?")) return;
  chats.splice(i,1);
  currentChat = chats.length > 0 ? 0 : null;
  save();
  if(currentChat !== null) openChat(0);
  else document.getElementById("chat").innerHTML = "";
  renderChats();
}

function addMessage(text, sender){
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.innerText = text;
  const chatBox = document.getElementById("chat");
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function updateCounter(){
  document.getElementById("tokenCounter").innerText = `Слов отправлено: ${wordsUsed} / ${WORD_LIMIT}`;
}

function save() { localStorage.setItem("j4on_chats", JSON.stringify(chats)); }

async function sendMessage(){
  if(currentChat===null) createChat();
  if(wordsUsed >= WORD_LIMIT) return alert("Лимит слов исчерпан!");

  const input = document.getElementById("userInput");
  const btn = document.getElementById("sendBtn");
  const text = input.value.trim();
  if(!text || btn.disabled) return;

  addMessage(text, "user");
  chats[currentChat].history.push({role: "user", parts: [{text: text}]});
  input.value = "";
  
  wordsUsed += text.split(/\s+/).length;
  localStorage.setItem("wordsUsed", wordsUsed);
  updateCounter();

  btn.disabled = true;
  btn.innerText = "...";

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ contents: chats[currentChat].history })
    });

    const data = await res.json();
    if(data.error) throw new Error(data.error.message);

    const reply = data.candidates[0].content.parts[0].text;
    addMessage(reply, "bot");
    chats[currentChat].history.push({role: "model", parts: [{text: reply}]});
    
    wordsUsed += reply.split(/\s+/).length;
    localStorage.setItem("wordsUsed", wordsUsed);
    updateCounter();

    if(chats[currentChat].name === "Новый чат") {
        chats[currentChat].name = text.slice(0, 25);
        document.getElementById("chatTitle").innerText = chats[currentChat].name;
    }
    save();
    renderChats();
  } catch (err) {
    addMessage("Ошибка: " + err.message, "bot");
  } finally {
    btn.disabled = false;
    btn.innerText = "➤";
  }
}

window.onload = () => {
  if(chats.length > 0) openChat(0);
  updateCounter();
};
</script>

</body>
</html>
