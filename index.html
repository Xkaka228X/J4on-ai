<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>j4on ai | Решение проблем</title>
<style>
:root { --bg: #1a1a1a; --panel: #252525; --text: #eee; --accent: #00bfff; --bot-msg: #333; }
body.light { --bg: #f5f5f5; --panel: #fff; --text: #222; --accent: #007bff; --bot-msg: #e9e9e9; }
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; }
body { display: flex; height: 100dvh; transition: 0.3s; }

/* Sidebar */
#sidebar { position: fixed; left: -280px; width: 280px; height: 100%; background: var(--panel); padding: 20px; transition: 0.3s; z-index: 1000; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
#sidebar.active { left: 0; }
#chatList { flex: 1; overflow-y: auto; margin: 15px 0; }
.chatItem { padding: 12px; border-radius: 10px; background: rgba(0,0,0,0.2); margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; font-size: 14px; border: 1px solid transparent; }
.chatItem.active { border-color: var(--accent); background: rgba(0, 191, 255, 0.1); }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
header { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1); }
#chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
.msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.bot { background: var(--bot-msg); align-self: flex-start; border-bottom-left-radius: 4px; }

/* Input */
#inputAreaWrapper { background: var(--panel); padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(0,0,0,0.1); }
#inputArea { display: flex; gap: 10px; }
input[type="text"] { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.2); background: rgba(0,0,0,0.1); color: inherit; outline: none; font-size: 16px; }
button { padding: 10px 20px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }

/* Modals */
#keyModal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
.modal-content { background: var(--panel); padding: 30px; border-radius: 24px; width: 90%; max-width: 380px; text-align: center; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="keyModal">
    <div class="modal-content">
        <h2 style="color:var(--accent); margin-top:0;">j4on ai</h2>
        <p style="font-size: 13px; opacity: 0.7;">Вставьте ключ API Gemini</p>
        <input type="password" id="apiKeyInput" placeholder="AIzaSy..." style="width:100%; padding:12px; border-radius:10px; border:1px solid #444; background:#111; color:white; margin-bottom:15px;">
        <button onclick="saveApiKey()" style="width:100%">Поехали</button>
        <p style="font-size: 11px; margin-top:15px;"><a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent)">Получить ключ бесплатно</a></p>
    </div>
</div>

<div id="sidebar">
    <button onclick="createChat()" style="width:100%">+ Новый чат</button>
    <div id="chatList"></div>
    <div style="border-top:1px solid #444; padding-top:15px;">
        <label style="font-size:11px;">Модель (попробуйте сменить, если ошибка):</label>
        <select id="modelSelect" style="width:100%; padding:8px; border-radius:8px; background:#111; color:#fff; margin-bottom:10px;">
            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
            <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash Latest</option>
            <option value="gemini-2.0-flash-exp">Gemini 2.0 Flash</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        </select>
        <button onclick="toggleTheme()" style="width:100%; background:#444; margin-bottom:5px;">🌙 Сменить тему</button>
        <button onclick="resetKey()" style="width:100%; background:none; color:red; font-size:11px;">Сбросить ключ</button>
    </div>
</div>

<div id="main">
    <header>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size:20px;">☰ <span id="chatTitle">j4on ai</span></div>
        <div id="status" style="font-size:10px; opacity:0.5;">Готов</div>
    </header>
    <div id="chat"></div>
    <div id="inputAreaWrapper">
        <div id="inputArea">
            <input type="text" id="userInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
let API_KEY = localStorage.getItem("gemini_api_key") || "";
let chats = JSON.parse(localStorage.getItem("j4on_chats") || "[]");
let currentChat = null;

if(API_KEY) document.getElementById("keyModal").classList.add("hidden");

function saveApiKey() {
    const val = document.getElementById("apiKeyInput").value.trim();
    if(val) { API_KEY = val; localStorage.setItem("gemini_api_key", val); document.getElementById("keyModal").classList.add("hidden"); }
}

function resetKey() { localStorage.removeItem("gemini_api_key"); location.reload(); }
function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }
function toggleTheme() { document.body.classList.toggle("light"); }

function save() { localStorage.setItem("j4on_chats", JSON.stringify(chats)); }

function renderChats() {
    const list = document.getElementById("chatList");
    list.innerHTML = "";
    chats.forEach((chat, i) => {
        const div = document.createElement("div");
        div.className = "chatItem" + (i === currentChat ? " active" : "");
        div.innerHTML = `<span onclick="openChat(${i}); toggleMenu()" style="flex:1">${chat.name}</span><span onclick="deleteChat(${i})">🗑</span>`;
        list.appendChild(div);
    });
}

function createChat() {
    chats.unshift({ name: "Новый чат", history: [] });
    currentChat = 0; save(); renderChats(); openChat(0);
}

function openChat(i) {
    currentChat = i;
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatTitle").innerText = chats[i].name;
    chats[i].history.forEach(msg => addMsg(msg.parts[0].text, msg.role === "user" ? "user" : "bot"));
    renderChats();
}

function deleteChat(i) {
    event.stopPropagation();
    chats.splice(i, 1);
    currentChat = chats.length > 0 ? 0 : null;
    save(); renderChats();
    if(currentChat !== null) openChat(0); else document.getElementById("chat").innerHTML = "";
}

function addMsg(text, sender) {
    const div = document.createElement("div");
    div.className = "msg " + sender;
    div.innerText = text;
    const box = document.getElementById("chat");
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    const model = document.getElementById("modelSelect").value;
    if(!text || !API_KEY) return;
    if(currentChat === null) createChat();

    addMsg(text, "user");
    chats[currentChat].history.push({ role: "user", parts: [{ text: text }] });
    input.value = "";
    document.getElementById("status").innerText = "Думает (" + model + ")...";

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: chats[currentChat].history })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message);

        const reply = data.candidates[0].content.parts[0].text;
        addMsg(reply, "bot");
        chats[currentChat].history.push({ role: "model", parts: [{ text: reply }] });
        
        if(chats[currentChat].name === "Новый чат") chats[currentChat].name = text.slice(0, 20);
        save(); renderChats();
    } catch (err) {
        addMsg("Ошибка: " + err.message, "bot");
        console.error(err);
        chats[currentChat].history.pop(); 
    } finally {
        document.getElementById("status").innerText = "Готов";
    }
}

window.onload = () => { if(chats.length > 0) openChat(0); };
</script>
</body>
</html>
