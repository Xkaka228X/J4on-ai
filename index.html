<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>j4on ai | Gemini</title>

<style>
:root {
  --bg: #1f1f1f;
  --panel: #2a2a2a;
  --text: #ffffff;
  --accent: #00bfff;
}

/* Фикс для мобильных экранов */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100dvh; /* Динамическая высота */
}

/* Sidebar */
#sidebar {
  position: fixed;
  left: -260px;
  width: 260px;
  height: 100%;
  background: var(--panel);
  padding: 15px;
  box-sizing: border-box;
  transition: 0.3s;
  z-index: 1000;
  border-right: 2px solid var(--accent);
}

#sidebar.active { left: 0; }

#chatList { margin-top: 15px; overflow-y: auto; height: calc(100% - 150px); }

.chatItem {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 8px;
  background: rgba(0,0,0,0.2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

.chatItem.active { border-left: 4px solid var(--accent); background: rgba(0, 191, 255, 0.1); }

/* Main Area */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 15px;
  background: var(--bg);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  z-index: 10;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding-bottom: 20px;
}

.message {
  padding: 12px;
  border-radius: 15px;
  max-width: 85%;
  line-height: 1.4;
  word-wrap: break-word;
  animation: fade 0.2s ease-in;
}

.user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
.bot { background: var(--panel); align-self: flex-start; color: var(--text); border-bottom-left-radius: 2px; }

/* Fixed Input Area */
#inputAreaWrapper {
  background: var(--panel);
  padding: 10px 15px 25px 15px; /* Больше отступ снизу для мобил */
  border-top: 1px solid rgba(255,255,255,0.1);
}

#inputArea {
  display: flex;
  gap: 10px;
  align-items: center;
}

input[type="text"] {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(0,0,0,0.3);
  color: var(--text);
  font-size: 16px; /* Предотвращает зум на iOS */
}

button {
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

#tokenCounter { font-size: 10px; color: var(--accent); margin-bottom: 5px; opacity: 0.7; }

/* Modals */
#keyModal, #helpModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); display: flex; justify-content: center;
    align-items: center; z-index: 9999;
}
.modal-content { 
    background: var(--panel); padding: 25px; border-radius: 20px; 
    text-align: center; width: 85%; max-width: 350px;
}
.hidden { display: none !important; }
</style>
</head>

<body>

<div id="keyModal">
    <div class="modal-content">
        <h3 style="color: var(--accent);">j4on ai</h3>
        <input type="password" id="apiKeyInput" placeholder="Вставьте API Ключ" style="width: 100%; padding: 12px; border-radius: 10px; border:none; margin: 15px 0; box-sizing:border-box;">
        <div style="display: flex; gap: 10px;">
            <button onclick="saveApiKey()" style="flex:1">Войти</button>
            <button onclick="showHelp()" style="background:#444;">?</button>
        </div>
    </div>
</div>

<div id="helpModal" class="hidden">
    <div class="modal-content">
        <h4>Как получить ключ:</h4>
        <p style="font-size: 13px;">1. Зайдите на <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent)">AI Studio</a><br>2. Нажмите Create API Key<br>3. Скопируйте его сюда</p>
        <button onclick="closeHelp()" style="width:100%">Понятно</button>
    </div>
</div>

<div id="sidebar">
  <button onclick="createChat()" style="width: 100%;">➕ Новый чат</button>
  <div id="chatList"></div>
  <button onclick="resetKey()" style="background:none; color:red; font-size:11px; margin-top:20px; width:100%;">Сбросить ключ</button>
</div>

<div id="main">
  <header>
    <div onclick="toggleMenu()" style="cursor:pointer">☰ <span id="chatTitle">j4on ai</span></div>
  </header>

  <div id="chat"></div>

  <div id="inputAreaWrapper">
    <div id="tokenCounter">Слов: 0 / 20000</div>
    <div id="inputArea">
      <input type="text" id="userInput" placeholder="Напиши сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("gemini_api_key") || "";
let chats = JSON.parse(localStorage.getItem("j4on_chats") || "[]");
let currentChat = null;
let wordsUsed = parseInt(localStorage.getItem("wordsUsed") || "0");
const WORD_LIMIT = 20000;

if(API_KEY) document.getElementById("keyModal").classList.add("hidden");

function saveApiKey() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if(key) {
        localStorage.setItem("gemini_api_key", key);
        API_KEY = key;
        document.getElementById("keyModal").classList.add("hidden");
    }
}

function showHelp() { document.getElementById("helpModal").classList.remove("hidden"); }
function closeHelp() { document.getElementById("helpModal").classList.add("hidden"); }
function resetKey() { localStorage.removeItem("gemini_api_key"); location.reload(); }
function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }

function renderChats() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";
  chats.forEach((chat, i) => {
    const div = document.createElement("div");
    div.className = "chatItem" + (i === currentChat ? " active" : "");
    div.innerHTML = `<span onclick="openChat(${i}); toggleMenu()" style="flex:1">${chat.name}</span><span onclick="deleteChat(${i})">🗑</span>`;
    list.appendChild(div);
  });
}

function createChat() {
  chats.unshift({ name: "Новый чат", history: [] });
  currentChat = 0;
  save(); renderChats(); openChat(0);
}

function openChat(i) {
  currentChat = i;
  document.getElementById("chat").innerHTML = "";
  document.getElementById("chatTitle").innerText = chats[i].name;
  chats[i].history.forEach(msg => addMessage(msg.parts[0].text, msg.role === "user" ? "user" : "bot"));
  renderChats();
}

function deleteChat(i) {
  chats.splice(i,1); save(); location.reload();
}

function addMessage(text, sender){
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function save() { localStorage.setItem("j4on_chats", JSON.stringify(chats)); }

async function sendMessage(){
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if(!text || currentChat === null) return;

  addMessage(text, "user");
  chats[currentChat].history.push({role: "user", parts: [{text: text}]});
  input.value = "";

  try {
    // Исправленная ссылка: v1 вместо v1beta
    const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ contents: chats[currentChat].history })
    });

    const data = await res.json();
    if(data.error) throw new Error(data.error.message);

    const reply = data.candidates[0].content.parts[0].text;
    addMessage(reply, "bot");
    chats[currentChat].history.push({role: "model", parts: [{text: reply}]});
    
    if(chats[currentChat].name === "Новый чат") chats[currentChat].name = text.slice(0,20);
    save(); renderChats();
  } catch (err) {
    addMessage("Ошибка: " + err.message, "bot");
  }
}

window.onload = () => { if(chats.length > 0) openChat(0); };
</script>
</body>
</html>
