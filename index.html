<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>j4on ai | Gemini</title>

<style>
:root {
  --bg: #1f1f1f; --panel: #2a2a2a; --text: #ffffff; --accent: #00bfff; --msg-bot: #333333;
}
body.light-theme {
  --bg: #f4f4f4; --panel: #ffffff; --text: #111111; --msg-bot: #e0e0e0;
}
html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
  display: flex; height: 100dvh; transition: background 0.3s;
}

/* Sidebar */
#sidebar {
  position: fixed; left: -260px; width: 260px; height: 100%; background: var(--panel);
  padding: 15px; box-sizing: border-box; transition: 0.3s; z-index: 1000;
  border-right: 2px solid var(--accent); display: flex; flex-direction: column;
}
#sidebar.active { left: 0; }
#chatList { margin-top: 15px; flex: 1; overflow-y: auto; }
.chatItem {
  padding: 12px; border-radius: 8px; margin-bottom: 8px; background: rgba(0,0,0,0.1);
  display: flex; justify-content: space-between; align-items: center; font-size: 14px; cursor: pointer;
}
.chatItem.active { border-color: var(--accent); background: rgba(0, 191, 255, 0.1); border: 1px solid var(--accent); }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
header {
  display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;
  background: var(--panel); border-bottom: 1px solid rgba(0,0,0,0.1);
}
#chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
.message { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; animation: fade 0.2s ease-in; }
.user { background: var(--accent); align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
.bot { background: var(--msg-bot); align-self: flex-start; color: var(--text); border-bottom-left-radius: 2px; }

#inputAreaWrapper { background: var(--panel); padding: 10px 15px 25px 15px; border-top: 1px solid rgba(0,0,0,0.1); }
#inputArea { display: flex; gap: 10px; align-items: center; }
input[type="text"] {
  flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1);
  background: rgba(0,0,0,0.05); color: var(--text); font-size: 16px; outline: none;
}
button { padding: 10px 18px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; }

/* Modals */
#keyModal, #helpModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 9999;
}
.modal-content { background: var(--panel); padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; }
.hidden { display: none !important; }
@keyframes fade { from {opacity:0; transform:translateY(5px);} to {opacity:1;} }
</style>
</head>

<body>

<div id="keyModal">
    <div class="modal-content">
        <h3 style="color: var(--accent); margin-top:0;">j4on ai</h3>
        <input type="password" id="apiKeyInput" placeholder="Введите API Ключ" style="width: 100%; padding: 12px; border-radius: 10px; border:1px solid #ddd; margin: 15px 0; box-sizing:border-box;">
        <div style="display: flex; gap: 10px;">
            <button onclick="saveApiKey()" style="flex:2">Начать</button>
            <button onclick="showHelp()" style="flex:1; background:#666;">?</button>
        </div>
    </div>
</div>

<div id="helpModal" class="hidden">
    <div class="modal-content">
        <h4>Нужен ключ?</h4>
        <p style="font-size: 13px;">Получите его в <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent)">Google AI Studio</a> (бесплатно).</p>
        <button onclick="closeHelp()" style="width:100%">Понятно</button>
    </div>
</div>

<div id="sidebar">
  <button onclick="createChat()" style="width: 100%;">➕ Новый чат</button>
  <div id="chatList"></div>
  <div style="margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.1);">
    <select onchange="changeAccent(this.value)" style="width:100%; margin-bottom:10px; padding:5px; border-radius:5px;">
        <option value="#00bfff">Голубой</option>
        <option value="#ff5500">Оранжевый</option>
        <option value="#55ff00">Зелёный</option>
    </select>
    <button onclick="toggleDarkLight()" style="width: 100%; background: #666; font-size: 12px;">Сменить тему</button>
    <button onclick="resetKey()" style="background:none; color:red; font-size:10px; margin-top:10px; width:100%;">Сбросить ключ</button>
  </div>
</div>

<div id="main">
  <header>
    <div onclick="toggleMenu()" style="cursor:pointer; font-weight:bold;">☰ <span id="chatTitle">j4on ai</span></div>
    <div id="status" style="font-size: 10px; opacity: 0.5;">Готов</div>
  </header>
  <div id="chat"></div>
  <div id="inputAreaWrapper">
    <div id="inputArea">
      <input type="text" id="userInput" placeholder="Напиши что-нибудь..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("gemini_api_key") || "";
let chats = JSON.parse(localStorage.getItem("j4on_chats") || "[]");
let currentChat = null;

if(API_KEY) document.getElementById("keyModal").classList.add("hidden");

// Сохранение
function save() { localStorage.setItem("j4on_chats", JSON.stringify(chats)); }

// Темы
function toggleDarkLight() { document.body.classList.toggle("light-theme"); }
function changeAccent(color) { document.documentElement.style.setProperty('--accent', color); }
function toggleMenu() { document.getElementById("sidebar").classList.toggle("active"); }

function renderChats() {
    const list = document.getElementById("chatList");
    list.innerHTML = "";
    chats.forEach((chat, i) => {
        const div = document.createElement("div");
        div.className = "chatItem" + (i === currentChat ? " active" : "");
        div.innerHTML = `<span onclick="openChat(${i}); toggleMenu()" style="flex:1">${chat.name}</span><span onclick="deleteChat(${i})">🗑</span>`;
        list.appendChild(div);
    });
}

function createChat() {
    chats.unshift({ name: "Новый чат", history: [] });
    currentChat = 0; save(); renderChats(); openChat(0);
}

function openChat(i) {
    currentChat = i;
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";
    document.getElementById("chatTitle").innerText = chats[i].name;
    chats[i].history.forEach(msg => addMessage(msg.parts[0].text, msg.role === "user" ? "user" : "bot"));
    renderChats();
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function deleteChat(i) {
    event.stopPropagation();
    chats.splice(i, 1);
    currentChat = chats.length > 0 ? 0 : null;
    save(); renderChats();
    if(currentChat !== null) openChat(0); else document.getElementById("chat").innerHTML = "";
}

function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "message " + sender;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

// ГЛАВНАЯ ФУНКЦИЯ ОТПРАВКИ
async function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if(!text || !API_KEY) return;

    if(currentChat === null) createChat();

    // Добавляем сообщение в интерфейс и историю
    addMessage(text, "user");
    chats[currentChat].history.push({ role: "user", parts: [{ text: text }] });
    input.value = "";
    document.getElementById("status").innerText = "Думает...";

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: chats[currentChat].history })
        });

        const data = await response.json();

        if (data.error) {
            // Если ошибка в ключе или формате
            throw new Error(data.error.message);
        }

        if (data.candidates && data.candidates[0].content) {
            const reply = data.candidates[0].content.parts[0].text;
            addMessage(reply, "bot");
            // Сохраняем ответ в историю строго с ролью model
            chats[currentChat].history.push({ role: "model", parts: [{ text: reply }] });
            
            if(chats[currentChat].name === "Новый чат") chats[currentChat].name = text.slice(0, 20);
            save(); renderChats();
        } else {
            throw new Error("Пустой ответ. Возможно, сработал фильтр безопасности.");
        }
    } catch (err) {
        addMessage("Ошибка: " + err.message, "bot");
        // Если произошла ошибка, удаляем последний запрос пользователя из истории, 
        // чтобы не нарушать очередность ролей при следующей попытке
        chats[currentChat].history.pop();
    } finally {
        document.getElementById("status").innerText = "Готов";
    }
}

function saveApiKey() {
    const val = document.getElementById("apiKeyInput").value.trim();
    if(val) { localStorage.setItem("gemini_api_key", val); API_KEY = val; document.getElementById("keyModal").classList.add("hidden"); }
}
function showHelp() { document.getElementById("helpModal").classList.remove("hidden"); }
function closeHelp() { document.getElementById("helpModal").classList.add("hidden"); }
function resetKey() { localStorage.removeItem("gemini_api_key"); location.reload(); }

window.onload = () => { if(chats.length > 0) openChat(0); };
</script>
</body>
</html>
